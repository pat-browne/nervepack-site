<h1>Fixtures</h1>
<p>A fixture is a function decorated with <code>@pytest.fixture</code>; request it by naming it as a test argument. <code>yield</code> splits setup from teardown. <code>scope=</code> (function / module / session) controls how often it runs.</p>
