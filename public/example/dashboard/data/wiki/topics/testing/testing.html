<h1>Testing</h1>
<p>How we test. Every behavior gets a happy-path and a failure-path assertion. Fixtures (see <a href="pytest-fixtures.html">pytest-fixtures</a>) set up state; parametrize to cover the matrix rather than copy-pasting cases. A test that can&#x27;t fail isn&#x27;t a test.</p>
